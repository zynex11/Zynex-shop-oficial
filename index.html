<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZYNEX | Limited Drop</title>
    <style>
        /* RESET I DARK ESTETIKA */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: #000; 
            color: white; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* LOGO SEKCIJA */
        header {
            width: 100%;
            padding: 25px;
            text-align: center;
            border-bottom: 1px solid #111;
        }
        .logo { 
            color: #00d4ff; 
            font-weight: 900; 
            font-size: 28px; 
            letter-spacing: 8px;
            text-transform: uppercase;
        }

        /* BANNER DOSTAVA */
        .shipping-banner {
            background: rgba(0, 212, 255, 0.05);
            border: 1px solid #00d4ff;
            color: #00d4ff;
            width: 90%;
            max-width: 400px;
            text-align: center;
            padding: 12px;
            border-radius: 12px;
            margin: 25px 0;
            font-size: 13px;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* GLAVNA KARTICA */
        .drop-card {
            width: 92%;
            max-width: 420px;
            background: #000;
            border: 1px solid #222;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            margin-bottom: 50px;
        }

        /* TAJMER BAR */
        .timer-strip {
            background: #ff0000;
            color: white;
            padding: 15px;
            text-align: center;
            font-weight: 900;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .card-content { padding: 25px; }

        .status-badge {
            background: #ff0000;
            font-size: 10px;
            font-weight: 900;
            padding: 5px 12px;
            border-radius: 6px;
            display: inline-block;
            margin-bottom: 15px;
        }

        /* PROSTOR ZA SLIKU */
        .image-wrapper {
            width: 100%;
            aspect-ratio: 1/1;
            background: #080808;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid #1a1a1a;
            margin-bottom: 20px;
        }
        .image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* INFO O PROIZVODU */
        .title {
            color: #ff0000;
            font-size: 30px;
            font-weight: 900;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        .desc {
            color: #777;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .spec-tags { display: flex; gap: 10px; margin-bottom: 30px; }
        .spec-tag { 
            border: 1px solid #333; 
            padding: 6px 14px; 
            border-radius: 8px; 
            font-size: 11px; 
            color: #00d4ff;
            font-weight: bold;
        }

        .price-box {
            font-size: 36px;
            font-weight: 900;
            margin-bottom: 25px;
            display: block;
        }

        /* DUGME ZA KUPOVINU */
        .checkout-btn {
            background: #ff0000;
            color: white;
            border: none;
            width: 100%;
            padding: 22px;
            border-radius: 20px;
            font-weight: 900;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }
        .checkout-btn:active { transform: scale(0.96); background: #b30000; }

        footer {
            color: #333;
            font-size: 12px;
            padding: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">ZYNEX</div>
    </header>

    <div class="shipping-banner">🇷🇸 DOSTAVA ZA SRBIJU</div>

    <div class="drop-card">
        <div class="timer-strip">
            AKCIJA ISTIČE ZA: <span id="timer">Očitavanje...</span>
        </div>

        <div class="card-content">
            <div class="status-badge">LIMITED DROP</div>

            <div class="image-wrapper">
                <img src="majica.png" alt="Mangup Edition">
            </div>

            <h1 class="title">MANGUP EDITION</h1>
            <p class="desc">Ekskluzivna serija sa 3D puff štampom. Izrađeno od 100% premium pamuka. Samo 50 primeraka u celom svetu.</p>

            <div class="spec-tags">
                <span class="spec-tag">3D Puff Print</span>
                <span class="spec-tag">240GSM Cotton</span>
            </div>

            <div class="price-box">1.900 RSD</div>

            <button class="checkout-btn">DODAJ U KORPU</button>
        </div>
    </div>

    <footer>© 2026 ZYNEX BUILT DIFFERENT</footer>

    <script>
        // POSTAVI DATUM KRAJA (npr. za 5 dana od danas)
        // Ako želiš fiksni datum: new Date("May 3, 2026 23:59:59").getTime();
        const countDownDate = new Date("May 3, 2026 23:59:59").getTime();

        const x = setInterval(function() {
            const now = new Date().getTime();
            const distance = countDownDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("timer").innerHTML = days + "d " + hours + "h "
            + minutes + "m " + seconds + "s ";

            if (distance < 0) {
                clearInterval(x);
                document.getElementById("timer").innerHTML = "DROP ZAVRŠEN";
            }
        }, 1000);
    </script>

</body>
</html>
