<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZYNEX | Official Store</title>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        .cart-header { position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.95); display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; z-index: 1000; border-bottom: 1px solid #222; box-sizing: border-box; }
        .logo-text { letter-spacing: 8px; font-weight: 900; font-size: 1.4rem; margin: 0; color: #0ff; }
        .cart-icon { position: relative; font-size: 1.6rem; cursor: pointer; }
        #cart-count { position: absolute; top: -8px; right: -12px; background: #fff; color: #000; font-size: 0.7rem; font-weight: bold; width: 22px; height: 22px; border-radius: 50%; display: flex; justify-content: center; align-items: center; }
        .cart-overlay { position: fixed; top: 0; right: -100%; width: 100%; height: 100%; background: #000; z-index: 2000; transition: 0.4s; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .cart-overlay.active { right: 0; }
        .close-cart { font-size: 1.2rem; cursor: pointer; color: #0ff; font-weight: bold; text-transform: uppercase; margin-bottom: 20px; display: block; }
        .checkout-form { margin-top: 20px; display: none; background: #0a0a0a; padding: 20px; border-radius: 15px; border: 1px solid #222; }
        .checkout-form.active { display: block; }
        .input-group { margin-bottom: 15px; }
        input { width: 100%; padding: 12px; margin-top: 5px; background: #111; border: 1px solid #333; color: #fff; border-radius: 8px; box-sizing: border-box; }
        input:focus { border-color: #0ff; outline: none; }
        label { font-size: 0.8rem; color: #888; text-transform: uppercase; }
        .cart-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #111; font-size: 0.9rem; }
        .total-box { margin-top: 20px; font-size: 1.5rem; font-weight: 900; text-align: right; color: #0ff; border-top: 1px solid #222; padding-top: 15px; }
        .container { padding: 100px 20px 50px 20px; max-width: 450px; margin: 0 auto; }
        .shipping-note { text-align: center; color: #0ff; font-size: 0.85rem; margin-bottom: 25px; font-weight: bold; text-transform: uppercase; letter-spacing: 1.5px; border: 1px solid #0ff; padding: 10px; border-radius: 10px; }
        .product-card { background: #080808; border: 1px solid #1a1a1a; border-radius: 25px; margin-bottom: 30px; padding: 15px; }
        .img-wrap img { width: 100%; border-radius: 20px; display: block; }
        .badge { background: #0ff; color: #000; font-size: 0.6rem; padding: 4px 8px; border-radius: 5px; font-weight: 900; margin-bottom: 10px; display: inline-block; }
        .buy-btn { background: #fff; color: #000; border: none; width: 100%; padding: 18px; font-weight: 900; border-radius: 12px; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        .flying-item { position: fixed; width: 50px; height: 50px; background-size: cover; border-radius: 50%; z-index: 9999; transition: all 0.7s; border: 2px solid #fff; pointer-events: none; }
    </style>
</head>
<body>

    <div class="cart-header">
        <h1 class="logo-text">ZYNEX</h1>
        <div class="cart-icon" onclick="toggleCart()">🛒 <span id="cart-count">0</span></div>
    </div>

    <div id="cart-overlay" class="cart-overlay">
        <span class="close-cart" onclick="toggleCart()">← NAZAD</span>
        <div id="cart-items-list">
            <p id="empty-msg" style="color:#444;">Korpa je prazna.</p>
        </div>
        
        <div id="checkout-area" class="checkout-form">
            <h3 style="color:#0ff; margin-top:0;">PODACI ZA DOSTAVU</h3>
            <form action="https://formspree.io/f/mvzdnvzw" method="POST" id="order-form">
                <div class="input-group">
                    <label>Ime i prezime</label>
                    <input type="text" name="Ime" required>
                </div>
                <div class="input-group">
                    <label>Vaš Email</label>
                    <input type="email" name="Email" required>
                </div>
                <div class="input-group">
                    <label>Adresa i Grad</label>
                    <input type="text" name="Adresa" required>
                </div>
                <div class="input-group">
                    <label>Broj telefona</label>
                    <input type="tel" name="Telefon" required>
                </div>
                
                <input type="hidden" name="Porudzbina" id="hidden-cart-data">
                
                <div class="total-box">UKUPNO: <span id="total-price">0</span> RSD</div>
                <button type="submit" class="buy-btn" style="background:#0ff;">POTVRDI PORUDŽBINU</button>
            </form>
        </div>
    </div>

    <div class="container">
        <div class="shipping-note">🇷🇸 DOSTAVA SAMO ZA SRBIJU</div>

        <div class="product-card">
            <div class="badge">BESTSELLER</div>
            <div class="img-wrap"><img src="file_0000000072f8720a9997474ec361edec.png"></div>
            <div class="info">
                <h2 style="margin: 15px 0 5px 0;">Signature Shirt</h2>
                <div style="font-size:1.8rem; font-weight:900;">1.400 RSD</div>
                <button class="buy-btn" onclick="addToCart('Signature Shirt', 1400, 'file_0000000072f8720a9997474ec361edec.png', event)">DODAJ U KORPU</button>
            </div>
        </div>

        <div class="product-card">
            <div class="badge" style="background: #fff;">LIMITED EDITION</div>
            <div class="img-wrap"><img src="1777234290869.png"></div>
            <div class="info">
                <h2 style="margin: 15px 0 5px 0;">Faca Edition Shirt</h2>
                <div style="font-size:1.8rem; font-weight:900;">1.500 RSD</div>
                <button class="buy-btn" onclick="addToCart('Faca Edition', 1500, '1777234290869.png', event)">DODAJ U KORPU</button>
            </div>
        </div>

        <div class="product-card">
            <div class="img-wrap"><img src="file_00000000574c71f492b1c3a7da8b1f62.png"></div>
            <div class="info">
                <h2 style="margin: 15px 0 5px 0;">ZYNEX Shorts</h2>
                <div style="font-size:1.8rem; font-weight:900;">900 RSD</div>
                <button class="buy-btn" onclick="addToCart('Shorts', 900, 'file_00000000574c71f492b1c3a7da8b1f62.png', event)">DODAJ U KORPU</button>
            </div>
        </div>
    </div>

    <script>
        let cart = [];
        let total = 0;

        function toggleCart() { 
            document.getElementById('cart-overlay').classList.toggle('active'); 
        }
        
        function addToCart(name, price, img, e) {
            cart.push({name, price});
            total += price;
            updateCartUI();

            // Animacija letenja u korpu
            const fly = document.createElement('div');
            fly.className = 'flying-item';
            fly.style.backgroundImage = `url(${img})`;
            fly.style.left = e.clientX + "px";
            fly.style.top = e.clientY + "px";
            document.body.appendChild(fly);

            const icon = document.querySelector('.cart-icon').getBoundingClientRect();
            setTimeout(() => {
                fly.style.left = icon.left + "px";
                fly.style.top = icon.top + "px";
                fly.style.transform = "scale(0.1)";
                fly.style.opacity = "0";
            }, 50);
            setTimeout(() => fly.remove(), 700);
        }

        function updateCartUI() {
            const list = document.getElementById('cart-items-list');
            const count = document.getElementById('cart-count');
            const totalD = document.getElementById('total-price');
            const check = document.getElementById('checkout-area');
            const hiddenInput = document.getElementById('hidden-cart-data');

            count.innerText = cart.length;
            totalD.innerText = total.toLocaleString();

            if (cart.length > 0) {
                document.getElementById('empty-msg').style.display = 'none';
                check.classList.add('active');
                
                // Osveži listu u korpi
                list.innerHTML = '<span class="close-cart" onclick="toggleCart()">← NAZAD</span>';
                let cartText = "";
                cart.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'cart-item';
                    div.innerHTML = `<span>${item.name}</span><b>${item.price} RSD</b>`;
                    list.appendChild(div);
                    cartText += item.name + " (" + item.price + " RSD), ";
                });
                // Ubaci listu proizvoda u skriveno polje za email
                hiddenInput.value = cartText + " UKUPNO: " + total + " RSD";
            }
        }
    </script>
</body>
</html>
